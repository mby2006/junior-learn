services:
  studybuddy:
    build: .
    container_name: studybuddy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8001}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin123}
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8001}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
